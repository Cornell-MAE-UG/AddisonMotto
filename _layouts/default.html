<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <title>{{ page.title }}{% unless page.title == site.title %} | {{ site.title }}{% endunless %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="site-shell nav-shell">
      <a class="wordmark" href="{{ "/" | relative_url }}" aria-label="Addison Motto home">
        <span class="wordmark-mark">AM</span>
        <span>Addison Motto</span>
      </a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-navigation">
        <span class="sr-only">Toggle navigation</span>
        <span></span><span></span>
      </button>
      <nav id="site-navigation" class="site-nav" aria-label="Primary navigation">
        <a class="{% if page.url == '/' %}active{% endif %}" href="{{ "/" | relative_url }}">Profile</a>
        <a class="{% if page.url contains '/projects' %}active{% endif %}" href="{{ "/projects/" | relative_url }}">Projects</a>
        <a class="{% if page.url == '/Resume/' %}active{% endif %}" href="{{ "/Resume/" | relative_url }}">Resume</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="site-shell footer-grid">
      <div>
        <p class="eyebrow">Contact</p>
        <h2>Addison Motto</h2>
      </div>
      <div class="footer-links">
        <a href="mailto:awm82@cornell.edu">awm82@cornell.edu</a>
        <a href="tel:+16092164166">609-216-4166</a>
        <a href="{{ "/assets/Resume.pdf" | relative_url }}" target="_blank" rel="noopener">View resume <span aria-hidden="true">&#8599;</span></a>
      </div>
    </div>
    <div class="site-shell footer-meta">
      <span>&copy; {{ "now" | date: "%Y" }} Addison Motto</span>
      <span>Mechanical Engineering &middot; Systems Engineering</span>
    </div>
  </footer>

  <script>
    const toggle = document.querySelector('.nav-toggle');
    const nav = document.querySelector('.site-nav');
    toggle.addEventListener('click', () => {
      const open = toggle.getAttribute('aria-expanded') === 'true';
      toggle.setAttribute('aria-expanded', String(!open));
      nav.classList.toggle('is-open');
    });
  </script>
</body>
</html>
